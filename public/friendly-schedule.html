<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>【Pickle Today】匹克球友誼賽預排賽程</title>
  <meta name="description" content="Pickle Today 匹克球友誼賽預排賽程，可視化查看每場隊伍與球員等級。" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://rickluo94.github.io/pickleball-tactical-analysis/friendly-schedule.html" />
  <meta property="og:title" content="【Pickle Today】匹克球友誼賽預排賽程" />
  <meta property="og:description" content="可視化查看匹克球友誼賽每場隊伍與球員等級。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rickluo94.github.io/pickleball-tactical-analysis/friendly-schedule.html" />
  <meta property="og:locale" content="zh_TW" />
  <meta name="twitter:card" content="summary" />
  <style>
    :root {
      --bg: #f4f7f4;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #647067;
      --line: #dfe7df;
      --green: #2f6f5e;
      --green-soft: #e8f4ef;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --amber: #b7791f;
      --amber-soft: #fff6df;
      --red: #dc2626;
      --red-soft: #feecec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    .site-nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }

    .site-nav-title {
      margin: 0;
      min-width: 180px;
      font-size: 26px;
      line-height: 1.35;
    }

    .site-nav-links {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .site-nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      color: var(--green);
      text-decoration: none;
      border: 1px solid #cfe0d8;
      background: rgba(255,255,255,.72);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(31,41,51,.06);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .summary-card strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      line-height: 1;
    }

    .schedule {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .match-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(31,41,51,.05);
      padding: 14px;
    }

    .match-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .match-no {
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
    }

    .team-total {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .team {
      border-radius: 12px;
      padding: 10px;
      background: #f9fbf9;
      border: 1px solid var(--line);
      min-width: 0;
    }

    .team.a { background: var(--green-soft); }
    .team.b { background: var(--blue-soft); }

    .team-label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .player {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid rgba(31,41,51,.08);
      min-height: 38px;
    }

    .player:first-of-type { border-top: 0; }

    .name {
      font-size: 16px;
      font-weight: 900;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .level {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      color: var(--amber);
      background: var(--amber-soft);
      border: 1px solid #f0dfb6;
    }

    .level.zero {
      color: var(--red);
      background: var(--red-soft);
      border-color: #f6c7c7;
    }

    .versus {
      align-self: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .message {
      padding: 16px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .summary,
      .schedule {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .wrap {
        padding: 16px 12px 28px;
      }

      .site-nav {
        display: block;
      }

      .site-nav-title {
        min-width: 0;
        margin-bottom: 12px;
      }

      .site-nav-links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .site-nav-link {
        width: 100%;
        min-width: 0;
        white-space: normal;
        text-align: center;
      }

      .teams {
        grid-template-columns: 1fr;
      }

      .versus {
        text-align: center;
      }
    }

    @media (max-width: 380px) {
      .site-nav-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="site-nav" aria-label="主要導覽">
      <h1 class="site-nav-title">友誼賽預排賽程</h1>
      <div class="site-nav-links">
        <a class="site-nav-link" href="index.html">回首頁</a>
        <a class="site-nav-link" href="tips.html">Tips小技巧</a>
        <a class="site-nav-link" href="pickleball-mixer.html">臨打配對器</a>
        <a class="site-nav-link" href="course.html">技能修練</a>
      </div>
    </nav>

    <section class="hero">
      <p>依照預排每場 A/B 隊組合、快速核對賽程。</p>
    </section>

    <section id="summary" class="summary" aria-label="賽程摘要"></section>

    <main>
      <section id="schedule" class="schedule" aria-label="賽程列表">
        <div class="message">載入賽程中...</div>
      </section>
    </main>
  </div>

  <script>
    const DATA_URL = 'friendly-preset-schedule.json';

    function teamLevel(team) {
      return team.reduce((sum, player) => sum + Number(player.level || 0), 0);
    }

    function levelClass(level) {
      return Number(level) === 0 ? 'level zero' : 'level';
    }

    function playerMarkup(player) {
      return `
        <div class="player">
          <span class="name">${player.name}</span>
          <span class="${levelClass(player.level)}">${Number(player.level).toFixed(1)}</span>
        </div>
      `;
    }

    function teamMarkup(label, team, className) {
      return `
        <div class="team ${className}">
          <div class="team-label">
            <span>${label} 隊</span>
            <span>合計 ${teamLevel(team).toFixed(1)}</span>
          </div>
          ${team.map(playerMarkup).join('')}
        </div>
      `;
    }

    function renderSchedule(matches) {
      document.getElementById('schedule').innerHTML = matches.map(match => `
        <article class="match-card">
          <div class="match-head">
            <span class="match-no">第 ${match.match} 場</span>
            <span class="team-total">A ${teamLevel(match.teamA).toFixed(1)} / B ${teamLevel(match.teamB).toFixed(1)}</span>
          </div>
          <div class="teams">
            ${teamMarkup('A', match.teamA, 'a')}
            <div class="versus">VS</div>
            ${teamMarkup('B', match.teamB, 'b')}
          </div>
        </article>
      `).join('');
    }

    function renderSummary(matches) {
      const playerNames = new Set();
      let totalLevel = 0;
      let teamCount = 0;

      matches.forEach(match => {
        [match.teamA, match.teamB].forEach(team => {
          teamCount++;
          totalLevel += teamLevel(team);
          team.forEach(player => playerNames.add(player.name));
        });
      });

      document.getElementById('summary').innerHTML = `
        <div class="summary-card"><span>總場次</span><strong>${matches.length}</strong></div>
        <div class="summary-card"><span>參賽人數</span><strong>${playerNames.size}</strong></div>
        <div class="summary-card"><span>隊伍數</span><strong>${teamCount}</strong></div>
        <div class="summary-card"><span>平均隊伍等級</span><strong>${(totalLevel / teamCount).toFixed(1)}</strong></div>
      `;
    }

    async function loadSchedule() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const matches = await response.json();
        renderSummary(matches);
        renderSchedule(matches);
      } catch (error) {
        const message = '無法載入 friendly-preset-schedule.json，請確認檔案存在並透過網站伺服器開啟此頁。';
        document.getElementById('schedule').innerHTML = `<div class="message">${message}</div>`;
        console.error(error);
      }
    }

    loadSchedule();
  </script>
</body>
</html>
