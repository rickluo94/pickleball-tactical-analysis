          </g>

          <!-- 攻擊路徑 -->
          <line id="leftRay" stroke="#a7e36d" stroke-width="4" stroke-dasharray="8 8"/>

          <input id="attackRange" type="range" min="160" max="1200" value="680" />

            <button onclick="setAngle(-35)">偏右回擊</button>

<input id="ballX" type="range" min="65" max="455" value="149" />

          <label>防守A站位 Y 軸 <span class="num"><span id="defYText">796</span></span></label>

          <input id="defRange" type="range" min="120" max="1200" value="410" />

        <div class="group">
          <div class="legend">
            <div class="item"><span class="dot" style="background:#111827"></span>發球方向</div>
            <div class="item"><span class="dot" style="background:#7ac943"></span>主要可能攻擊路徑</div>
            <div class="item"><span class="dot" style="background:#a7e36d"></span>可攻擊範圍</div>
            <div class="item"><span class="dot" style="background:#2563eb"></span>防守站位</div>
            <div class="item"><span class="dot" style="background:#60a5fa"></span>防守覆蓋範圍</div>
            <div class="item"><span class="dot" style="background:#ef4444"></span>對手</div>

          <div class="card">
            <strong>攻擊型態</strong>
            <span id="routeName">中間壓迫</span>
          </div>
          <div class="card">
            <strong>左側威脅</strong>
