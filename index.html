<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>【JINHOPA】匹克球戰術分析工具｜拍面角度與攻擊路徑</title>
<link rel="stylesheet" href="index.css" />
<script src="index.js" defer></script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9EN1F98JYX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-9EN1F98JYX');
</script>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 6px;">
        <h1 style="margin: 0;">【JINHOPA】匹克球｜戰術分析工具</h1>
        <a href="tips.html" style="background: #eef2ff; color: #2563eb; text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #dbeafe;">💡 Tips小技巧</a>
      </div>
      <p>可透過拖曳直接調整對手拍子位置，並分析攻擊角度、直線威脅與對角威脅。</p>
    </div>

    <div class="content">
      <div class="courtBox">
        <svg id="court" viewBox="0 0 520 1024" style="touch-action: none;">
          <rect x="0" y="0" width="520" height="1024" fill="#6dbb6a"/>
          <rect x="50" y="50" width="420" height="924" fill="none" stroke="white" stroke-width="5"/>
          <line x1="50" y1="512" x2="470" y2="512" stroke="#222" stroke-width="6"/>
          <line x1="50" y1="365" x2="470" y2="365" stroke="white" stroke-width="4"/>
          <line x1="50" y1="659" x2="470" y2="659" stroke="white" stroke-width="4"/>
          <line x1="260" y1="50" x2="260" y2="365" stroke="white" stroke-width="4"/>
          <line x1="260" y1="659" x2="260" y2="974" stroke="white" stroke-width="4"/>

          <text x="478" y="518" font-size="18" fill="#222">Net</text>
          <text x="62" y="354" font-size="16" fill="white">Kitchen Line</text>
          <text x="62" y="681" font-size="16" fill="white">Kitchen Line</text>

          <!-- 可攻擊扇形 -->
          <path id="fanArea" fill="rgba(167,227,109,.28)" stroke="rgba(122,201,67,.35)" stroke-width="2" style="cursor: move; pointer-events: auto; touch-action: none;"></path>

          <!-- 來球方向 -->
          <line id="incoming" x1="149" y1="909" x2="348" y2="261" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
          <circle id="incomingDot" cx="149" cy="909" r="20" fill="#111827" style="cursor: move; pointer-events: auto; touch-action: none;"/>
          <text id="incomingText" x="164" y="884" font-size="18" fill="#111827">來球方向</text>

          <!-- 攻擊路徑 -->
          <line id="leftRay" stroke="#a7e36d" stroke-width="4" stroke-dasharray="8 8"/>
          <line id="mainRay" stroke="#7ac943" stroke-width="7" stroke-linecap="round"/>
          <line id="rightRay" stroke="#a7e36d" stroke-width="4" stroke-dasharray="8 8"/>

          <!-- 防守者站位 -->
          <g id="defender" style="cursor: move; pointer-events: auto; touch-action: none;">
            <circle cx="260" cy="796" r="20" fill="#2563eb"/>
            <text x="283" y="802" font-size="17" font-weight="800" fill="#2563eb">防守站位</text>
          </g>

          <!-- 對手拍子與擊球點 -->
          <g id="hitPoint" style="cursor: move; pointer-events: auto; touch-action: none;">
            <!-- 拍子移入此群組，座標將自動跟隨 hitPoint -->
            <g id="paddle">
              <line x1="0" y1="0" x2="0" y2="-58" stroke="#1f2933" stroke-width="10" stroke-linecap="round"/>
              <rect x="-14" y="-68" width="28" height="48" rx="13" fill="#1f2933"/>
            </g>
            <circle id="hitDot" r="16" fill="#1f2933"/>
            <line x1="-20" y1="-20" x2="20" y2="20" stroke="#1f2933" stroke-width="5" stroke-linecap="round"/>
            <line x1="20" y1="-20" x2="-20" y2="20" stroke="#1f2933" stroke-width="5" stroke-linecap="round"/>
            <text x="22" y="-8" font-size="18" font-weight="700" fill="#1f2933">擊球點 X</text>
          </g>
          <text id="routeText" x="332" y="360" font-size="20" font-weight="900" fill="#1f2933"></text>
        </svg>
      </div>

      <aside class="side">
        <div class="group">
          <label>拍面角度 <span class="num"><span id="angleText">0</span>°</span></label>
          <input id="angle" type="range" min="-55" max="55" value="0" />
          <div class="btns">
            <button onclick="setAngle(-35)">偏右回擊</button>
            <button onclick="setAngle(0)">正面回擊</button>
            <button onclick="setAngle(35)">偏左回擊</button>
            <button class="secondary" onclick="animateDemo()">自動示範</button>
          </div>
        </div>

        <div class="group">
          <label>對手拍子 X 軸 <span class="num"><span id="xText">348</span></span></label>
          <input id="hitX" type="range" min="65" max="455" value="348" />
          <label>對手拍子 Y 軸 <span class="num"><span id="yText">261</span></span></label>
          <input id="hitY" type="range" min="70" max="502" value="261" />
        </div>

        <div class="group">
          <label>來球 X 軸 <span class="num"><span id="ballXText">149</span></span></label>
<input id="ballX" type="range" min="65" max="455" value="149" />
<label>來球 Y 軸 <span class="num"><span id="ballYText">909</span></span></label>
<input id="ballY" type="range" min="532" max="954" value="909" />

<label>防守站位 X 軸 <span class="num"><span id="defXText">260</span></span></label>
          <input id="defX" type="range" min="65" max="455" value="260" />
          <label>防守站位 Y 軸 <span class="num"><span id="defYText">796</span></span></label>
          <input id="defY" type="range" min="680" max="954" value="796" />
        </div>

        <div class="group">
          <div class="legend">
            <div class="item"><span class="dot" style="background:#111827"></span>來球方向</div>
            <div class="item"><span class="dot" style="background:#7ac943"></span>主要可能攻擊路徑</div>
            <div class="item"><span class="dot" style="background:#a7e36d"></span>可攻擊範圍</div>
            <div class="item"><span class="dot" style="background:#2563eb"></span>防守站位</div>
          </div>
        </div>

        <div class="group analysis">
          <div class="card">
            <strong>攻擊型態</strong>
            <span id="routeName">中間壓迫</span>
          </div>
          <div class="card">
            <strong>左側威脅</strong>
            <span class="risk" id="lineRisk">--</span>
          </div>
          <div class="card">
            <strong>右側威脅</strong>
            <span class="risk" id="crossRisk">--</span>
          </div>
          <div class="card">
            <strong>站位建議</strong>
            <span id="suggestion">--</span>
          </div>
        </div>

        <div class="note">
          說明：這是視覺化戰術判斷工具，主要用於理解拍面角度、擊球點位置與防守站位之間的關係。
        </div>
        <a href="https://shopee.tw/product/1345340496/50554287939" target="_blank">
          小工商【JINHOPA】高階匹克球拍｜摩擦回饋｜緩衝核心｜輕量化
        </a>
      </aside>
    </div>
  </div>
</div>
</body>
</html>
